version: '3.8'

services:
  redis:
    image: redis:7
    expose:
      - "6379"

  livekit:
    image: livekit/livekit-server:latest
    command: --config /etc/livekit/config.yaml
    ports:
      - "7880:7880"   # HTTP/WS API
      - "7881:7881"   # RTC TCP
      - "50000-50200:50000-50200/udp"  # RTC UDP range
    volumes:
      - ./livekit.yaml:/etc/livekit/config.yaml
    restart: unless-stopped

  web:
    build: .
    command: daphne -b 0.0.0.0 -p 8000 school_project.asgi:application
    volumes:
      - .:/app
    environment:
      - DEBUG=${DEBUG:-False}
      - SECRET_KEY=${SECRET_KEY}
      - ALLOWED_HOSTS=${ALLOWED_HOSTS:-*}
      - REDIS_URL=redis://redis:6379/0
      - LIVEKIT_URL=${LIVEKIT_URL:-ws://livekit:7880}
      - LIVEKIT_API_KEY=${LIVEKIT_API_KEY:-devkey}
      - LIVEKIT_API_SECRET=${LIVEKIT_API_SECRET:-devsecret}
    depends_on:
      - redis
      - livekit
    ports:
      - "8000:8000"

  nginx:
    image: nginx:latest
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf
      - ./staticfiles:/app/static
      - ./media:/app/media
    depends_on:
      - web
