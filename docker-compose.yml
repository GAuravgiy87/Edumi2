version: '3.8'

services:
  redis:
    image: redis:7
    # No ports needed for production as it stays internal
    expose:
      - "6379"

  web:
    build: .
    command: daphne -b 0.0.0.0 -p 8000 school_project.asgi:application
    volumes:
      - .:/app
    environment:
      - DEBUG=${DEBUG:-False}
      - SECRET_KEY=${SECRET_KEY}
      - ALLOWED_HOSTS=${ALLOWED_HOSTS:-*}
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      - redis
    ports:
      - "8000:8000"

  nginx:
    image: nginx:latest
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf
      - ./staticfiles:/app/static
      - ./media:/app/media
      # Mount the sqlite database file strictly for Nginx if somehow needed? No.
    depends_on:
      - web
