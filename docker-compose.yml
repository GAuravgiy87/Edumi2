
# =============================================================================
#  EduMi — Docker Compose (separate container per service for performance)
#
#  Services:
#    redis      — Channel layer + Celery broker  (dedicated instance)
#    db         — SQLite via volume (swap for postgres easily)
#    web        — Daphne ASGI server             (dedicated instance)
#    celery     — Background task worker         (dedicated instance, 6 workers)
#    celery_beat— Scheduled tasks                (dedicated instance)
#    nginx      — Reverse proxy + static files   (dedicated instance)
# =============================================================================

x-app-env: &app-env
  DJANGO_SETTINGS_MODULE: school_project.settings
  SECRET_KEY: ${SECRET_KEY:-django-insecure-change-me-in-production}
  DEBUG: ${DEBUG:-False}
  ALLOWED_HOSTS: ${ALLOWED_HOSTS:-*}
  REDIS_URL: redis://redis:6379/0
  FACE_ENCRYPTION_KEY: ${FACE_ENCRYPTION_KEY:-}
  FACE_MATCH_THRESHOLD: ${FACE_MATCH_THRESHOLD:-0.50}
  FACE_PRESENCE_DURATION: ${FACE_PRESENCE_DURATION:-30}
  # OpenCV performance � capped to 4 shared cores
  OMP_NUM_THREADS: "2"
  OPENBLAS_NUM_THREADS: "2"
  MKL_NUM_THREADS: "2"
  OPENCV_FFMPEG_CAPTURE_OPTIONS: "rtsp_transport;tcp"

x-app-base: &app-base
  build:
    context: .
    dockerfile: Dockerfile
    target: runtime
  environment:
    <<: *app-env
  volumes:
    - media_data:/app/media
    - static_data:/app/staticfiles
    - db_data:/app/db
  restart: unless-stopped
  depends_on:
    redis:
      condition: service_healthy

services:

  # ── Redis: dedicated broker + channel layer instance ─────────────────────
  redis:
    image: redis:7-alpine
    container_name: edumi_redis
    command: >
      redis-server
      --maxmemory 512mb
      --maxmemory-policy allkeys-lru
      --save ""
      --appendonly no
      --loglevel notice
    volumes:
      - redis_data:/data
    expose:
      - "6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 512M

  # ── Web: Daphne ASGI — dedicated instance ────────────────────────────────
  web:
    <<: *app-base
    container_name: edumi_web
    command: >
      daphne
        -b 0.0.0.0
        -p 8000
        --access-log /app/logs/access.log
        -v 1
        school_project.asgi:application
    expose:
      - "8000"
    volumes:
      - media_data:/app/media
      - static_data:/app/staticfiles
      - db_data:/app/db
      - logs_data:/app/logs
    # AMD GPU device passthrough — only works if /dev/dri exists on the host.
    # If GPU is not available, comment out the devices + group_add lines.
    devices:
      - /dev/dri:/dev/dri
    group_add:
      - video
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 2G
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000/health/ || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  # ── Celery worker: dedicated instance, 6 concurrent workers ──────────────
  celery:
    <<: *app-base
    container_name: edumi_celery
    command: >
      celery -A school_project worker
        --loglevel=info
        --concurrency=2
        --max-tasks-per-child=100
        --logfile=/app/logs/celery.log
    volumes:
      - media_data:/app/media
      - db_data:/app/db
      - logs_data:/app/logs
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 1G
    healthcheck:
      test: ["CMD-SHELL", "celery -A school_project inspect ping -d celery@$$HOSTNAME || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  # ── Celery beat: scheduled tasks — dedicated lightweight instance ─────────
  celery_beat:
    <<: *app-base
    container_name: edumi_celery_beat
    command: >
      celery -A school_project beat
        --loglevel=info
        --logfile=/app/logs/celery_beat.log
    volumes:
      - db_data:/app/db
      - logs_data:/app/logs
    deploy:
      resources:
        limits:
          cpus: "0.2"
          memory: 256M

  # ── Nginx: reverse proxy + static/media serving — dedicated instance ─────
  nginx:
    image: nginx:1.25-alpine
    container_name: edumi_nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - static_data:/app/static:ro
      - media_data:/app/media:ro
      - logs_data:/app/logs
    depends_on:
      web:
        condition: service_healthy
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: "0.3"
          memory: 256M
    healthcheck:
      test: ["CMD", "nginx", "-t"]
      interval: 30s
      timeout: 5s
      retries: 3

volumes:
  redis_data:
  media_data:
  static_data:
  db_data:
  logs_data:

networks:
  default:
    name: edumi_network
    driver: bridge
