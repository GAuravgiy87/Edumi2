{% extends 'base.html' %}
{% load static %}

{% block content %}
<div class="auth-page-wrapper">
    <div class="auth-glass-card">
        <div class="auth-header">
            <div class="auth-logo-box">
                <img src="{% static 'logo.svg' %}" alt="EduMi" style="width: 100%; height: 100%; object-fit: contain; filter: drop-shadow(0 0 10px rgba(99,102,241,0.3));">
            </div>
            <h1>Welcome Back</h1>
            <p>Access your academic portal</p>
        </div>

        {% if error %}
        <div class="error-msg">
            <i data-lucide="alert-circle" style="width:16px; height:16px; vertical-align: middle; margin-right: 8px;"></i>
            {{ error }}
        </div>
        {% endif %}

        <form method="post">
            {% csrf_token %}
            <div class="auth-input-group">
                <label class="auth-label">Username / Email</label>
                <input type="text" name="username" class="auth-input" placeholder="Enter your identity" required autofocus>
            </div>

            <div class="auth-input-group">
                <label class="auth-label">Password</label>
                <input type="password" name="password" class="auth-input" placeholder="••••••••" required>
            </div>

            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.5rem; font-size: 0.8125rem; color: rgba(255,255,255,0.7);">
                <label style="display: flex; align-items: center; gap: 0.5rem; cursor: pointer;">
                    <input type="checkbox" name="remember" style="accent-color: var(--primary-auth);">
                    <span>Remember me</span>
                </label>
                <a href="#" style="color: var(--primary-auth); text-decoration: none; font-weight: 600;">Forgot Password?</a>
            </div>

            <button type="submit" class="auth-btn-primary">
                Log In
            </button>
        </form>

        <div class="auth-footer">
            Don't have an account? <a href="{% url 'register' %}">Create Account</a>
        </div>
    </div>
</div>
{% endblock %}
