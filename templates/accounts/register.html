{% extends 'base.html' %}
{% load static %}

{% block content %}
<div class="auth-page-wrapper">
    <div class="auth-glass-card">
        <div class="auth-header">
            <div class="auth-logo-box">
                <img src="{% static 'logo.svg' %}" alt="EduMi" style="width: 100%; height: 100%; object-fit: contain; filter: drop-shadow(0 0 10px rgba(99,102,241,0.3));">
            </div>
            <h1>Create Account</h1>
            <p>Join our academic community</p>
        </div>

        {% if error %}
        <div class="error-msg">
            <i data-lucide="alert-circle" style="width:16px; height:16px; vertical-align: middle; margin-right: 8px;"></i>
            {{ error }}
        </div>
        {% endif %}

        <form method="post" id="registerForm">
            {% csrf_token %}
            <div class="auth-input-group">
                <label class="auth-label">Choose Username</label>
                <input type="text" name="username" class="auth-input" placeholder="e.g. johndoe" required autofocus>
            </div>

            <div class="auth-input-group">
                <label class="auth-label">Password</label>
                <input type="password" name="password1" class="auth-input" placeholder="••••••••" required>
            </div>

            <div class="auth-input-group">
                <label class="auth-label">Confirm Password</label>
                <input type="password" name="password2" class="auth-input" placeholder="••••••••" required>
            </div>

            <div class="auth-label" style="margin-bottom: 0.75rem;">I am joining as a</div>
            <div class="role-grid">
                <label class="role-option active" id="role-student">
                    <input type="radio" name="user_type" value="student" checked style="display:none;">
                    <i data-lucide="graduation-cap"></i>
                    <span>Student</span>
                </label>
                <label class="role-option" id="role-teacher">
                    <input type="radio" name="user_type" value="teacher" style="display:none;">
                    <i data-lucide="briefcase"></i>
                    <span>Teacher</span>
                </label>
            </div>

            <button type="submit" class="auth-btn-primary">
                Create Account
            </button>
        </form>

        <div class="auth-footer">
            Already have an account? <a href="{% url 'login' %}">Log In</a>
        </div>
    </div>
</div>

<script>
    document.addEventListener('DOMContentLoaded', () => {
        const studentRole = document.getElementById('role-student');
        const teacherRole = document.getElementById('role-teacher');
        
        studentRole.addEventListener('click', () => {
            studentRole.classList.add('active');
            teacherRole.classList.remove('active');
        });
        
        teacherRole.addEventListener('click', () => {
            teacherRole.classList.add('active');
            studentRole.classList.remove('active');
        });
        
        lucide.createIcons();
    });
</script>
{% endblock %}
