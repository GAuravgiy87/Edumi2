{% extends 'base_sidebar.html' %}
{% load static %}

{% block content %}
<div class="container-fluid py-4">
    <div class="row justify-content-center">
        <div class="col-md-8">
            <div class="card shadow-sm border-0">
                <div class="card-header bg-white py-3 border-0">
                    <h5 class="mb-0 font-weight-bold">Upload Video Lecture</h5>
                    <p class="text-muted small mb-0">Upload pre-recorded videos to share with your students.</p>
                </div>
                <div class="card-body">
                    {% if error %}
                    <div class="alert alert-danger">{{ error }}</div>
                    {% endif %}

                    <form method="POST" enctype="multipart/form-data">
                        {% csrf_token %}
                        <div class="mb-4">
                            <label class="form-label font-weight-bold">Lecture Title</label>
                            <input type="text" name="title" class="form-control" placeholder="e.g. Introduction to Physics" required>
                        </div>

                        <div class="mb-4">
                            <label class="form-label font-weight-bold">Description</label>
                            <textarea name="description" class="form-control" rows="4" placeholder="Briefly describe what this lecture covers..."></textarea>
                        </div>

                        <div class="mb-4">
                            <label class="form-label font-weight-bold">Link to Camera (Optional)</label>
                            <select name="camera" class="form-select">
                                <option value="">Not linked to a camera</option>
                                {% for camera in cameras %}
                                <option value="{{ camera.id }}">{{ camera.name }}</option>
                                {% endfor %}
                            </select>
                        </div>

                        <div class="mb-4">
                            <label class="form-label font-weight-bold">Video File (MP4 recommended)</label>
                            <div class="upload-zone p-5 text-center border rounded-3 bg-light position-relative">
                                <input type="file" name="video_file" class="position-absolute w-100 h-100 top-0 start-0 opacity-0 cursor-pointer" id="videoInput" accept="video/*" required>
                                <div id="uploadPlaceholder">
                                    <i data-lucide="upload-cloud" class="mb-3 text-primary" style="width: 48px; height: 48px;"></i>
                                    <h6>Click or drag and drop to upload</h6>
                                    <p class="text-muted small">Max file size: 500MB</p>
                                </div>
                                <div id="fileInfo" class="d-none">
                                    <i data-lucide="file-video" class="mb-2 text-success" style="width: 32px; height: 32px;"></i>
                                    <h6 id="fileName" class="mb-1"></h6>
                                    <p id="fileSize" class="text-muted small mb-0"></p>
                                    <button type="button" class="btn btn-sm btn-outline-danger mt-2" onclick="resetUpload()">Change File</button>
                                </div>
                            </div>
                        </div>

                        <div class="d-grid">
                            <button type="submit" class="btn btn-primary py-2 font-weight-bold">
                                <i data-lucide="check-circle" class="me-2" style="width: 18px; height: 18px;"></i>
                                Upload and Save
                            </button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>

<style>
    .cursor-pointer { cursor: pointer; }
    .upload-zone { border: 2px dashed #e2e8f0 !important; transition: all 0.2s; }
    .upload-zone:hover { border-color: #6366f1 !important; background: #f5f3ff !important; }
</style>

<script>
    document.getElementById('videoInput').addEventListener('change', function(e) {
        const file = e.target.files[0];
        if (file) {
            document.getElementById('uploadPlaceholder').classList.add('d-none');
            document.getElementById('fileInfo').classList.remove('d-none');
            document.getElementById('fileName').textContent = file.name;
            document.getElementById('fileSize').textContent = (file.size / (1024 * 1024)).toFixed(2) + ' MB';
            if (window.lucide) lucide.createIcons();
        }
    });

    function resetUpload() {
        document.getElementById('videoInput').value = '';
        document.getElementById('uploadPlaceholder').classList.remove('d-none');
        document.getElementById('fileInfo').classList.add('d-none');
    }
</script>
{% endblock %}
