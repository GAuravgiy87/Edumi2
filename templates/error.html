{% extends 'base.html' %}
{% block title %}Error — EduMi{% endblock %}
{% block content %}
<div style="max-width:520px; margin:80px auto; text-align:center; padding:0 20px;">
    <div style="width:72px; height:72px; background:rgba(239,68,68,.12); border-radius:50%; display:flex; align-items:center; justify-content:center; margin:0 auto 24px;">
        <svg viewBox="0 0 24 24" fill="none" stroke="#ef4444" stroke-width="2" width="36"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
    </div>
    <h2 style="margin:0 0 12px; font-size:1.4rem; font-weight:800;">Access Denied</h2>
    <p style="opacity:.65; margin:0 0 28px; line-height:1.6;">{{ message|default:"You do not have permission to view this page." }}</p>
    <a href="javascript:history.back()" style="display:inline-flex; align-items:center; gap:8px; padding:12px 28px; background:linear-gradient(135deg,#667eea,#764ba2); color:#fff; text-decoration:none; border-radius:12px; font-weight:600;">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="16"><polyline points="15 18 9 12 15 6"/></svg>
        Go Back
    </a>
</div>
{% endblock %}
