{% extends 'base_sidebar.html' %}
{% load static %}

{% block extra_css %}
<style>
.create-meeting-wrapper {
    min-height: calc(100vh - 80px);
    display: flex;
    align-items: center;
    justify-content: center;
    padding: clamp(1rem, 3vh, 2rem) clamp(1rem, 2vw, 1.5rem);
    background: linear-gradient(135deg, #f8f9fa 0%, #e9ecef 100%);
}

.create-meeting-card {
    background: var(--white);
    border-radius: clamp(16px, 2vw, 20px);
    box-shadow: 0 10px 40px rgba(0, 0, 0, 0.08);
    padding: clamp(1.5rem, 3vw, 2.5rem);
    width: 100%;
    max-width: min(650px, 95vw);
    animation: slideUp 0.4s ease-out;
}

@keyframes slideUp {
    from {
        opacity: 0;
        transform: translateY(20px);
    }
    to {
        opacity: 1;
        transform: translateY(0);
    }
}

.meeting-header {
    text-align: center;
    margin-bottom: clamp(1.5rem, 3vh, 2rem);
}

.meeting-icon {
    width: clamp(48px, 8vw, 56px);
    height: clamp(48px, 8vw, 56px);
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    border-radius: clamp(12px, 2vw, 14px);
    display: flex;
    align-items: center;
    justify-content: center;
    margin: 0 auto clamp(0.75rem, 1.5vh, 1rem);
}

.meeting-icon svg {
    width: clamp(24px, 4vw, 28px);
    height: clamp(24px, 4vw, 28px);
    stroke: white;
}

.meeting-header h2 {
    font-size: clamp(1.25rem, 3vw, 1.625rem);
    font-weight: 700;
    color: var(--gray-900);
    margin-bottom: clamp(0.25rem, 0.5vh, 0.375rem);
}

.meeting-header p {
    font-size: clamp(0.8rem, 1.5vw, 0.875rem);
    color: var(--gray-600);
}

.meeting-form {
    display: flex;
    flex-direction: column;
    gap: clamp(1rem, 2vh, 1.25rem);
}

.form-group {
    margin-bottom: 0;
}

.form-group label {
    display: block;
    font-weight: 600;
    color: var(--gray-700);
    margin-bottom: clamp(0.375rem, 0.8vh, 0.5rem);
    font-size: clamp(0.8rem, 1.4vw, 0.875rem);
}

.form-group input,
.form-group textarea {
    width: 100%;
    padding: clamp(0.625rem, 1.2vh, 0.75rem) clamp(0.75rem, 1.5vw, 0.875rem);
    border: 1px solid var(--gray-300);
    border-radius: clamp(8px, 1.2vw, 10px);
    font-size: clamp(0.8rem, 1.5vw, 0.875rem);
    transition: all 0.2s;
    background: var(--white);
    font-family: inherit;
}

.form-group input:focus,
.form-group textarea:focus {
    outline: none;
    border-color: #667eea;
    box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
}

.form-group textarea {
    resize: vertical;
    min-height: clamp(70px, 12vh, 90px);
}

.form-row {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(min(200px, 100%), 1fr));
    gap: clamp(0.75rem, 1.5vw, 1rem);
}

.checkbox-group {
    display: flex;
    gap: clamp(1rem, 2vw, 1.5rem);
    flex-wrap: wrap;
}

.checkbox-label {
    display: flex;
    align-items: center;
    gap: clamp(0.375rem, 0.8vw, 0.5rem);
    cursor: pointer;
    font-size: clamp(0.8rem, 1.4vw, 0.875rem);
    color: var(--gray-700);
    font-weight: 500;
}

.checkbox-label input[type="checkbox"] {
    width: clamp(16px, 2.5vw, 18px);
    height: clamp(16px, 2.5vw, 18px);
    cursor: pointer;
    accent-color: #667eea;
}

.form-actions {
    display: flex;
    gap: clamp(0.75rem, 1.5vw, 1rem);
    margin-top: clamp(0.5rem, 1vh, 0.75rem);
}

.btn-cancel {
    flex: 1;
    padding: clamp(0.75rem, 1.5vh, 0.875rem);
    background: var(--gray-100);
    color: var(--gray-700);
    border: 1px solid var(--gray-300);
    border-radius: clamp(8px, 1.5vw, 10px);
    font-size: clamp(0.8rem, 1.5vw, 0.875rem);
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
    text-decoration: none;
    display: inline-flex;
    align-items: center;
    justify-content: center;
}

.btn-cancel:hover {
    background: var(--gray-200);
    transform: translateY(-1px);
}

.btn-submit {
    flex: 2;
    padding: clamp(0.75rem, 1.5vh, 0.875rem);
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    color: var(--white);
    border: none;
    border-radius: clamp(8px, 1.5vw, 10px);
    font-size: clamp(0.8rem, 1.5vw, 0.875rem);
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
    box-shadow: 0 4px 12px rgba(102, 126, 234, 0.3);
}

.btn-submit:hover {
    transform: translateY(-2px);
    box-shadow: 0 6px 20px rgba(102, 126, 234, 0.4);
}

.btn-submit:active {
    transform: translateY(0);
}

@media (max-width: 640px) {
    .form-row {
        grid-template-columns: 1fr;
    }
    
    .checkbox-group {
        flex-direction: column;
        gap: 0.75rem;
    }
    
    .form-actions {
        flex-direction: column-reverse;
    }
    
    .btn-cancel,
    .btn-submit {
        flex: 1;
    }
}
</style>
{% endblock %}

{% block content %}
<div class="create-meeting-wrapper">
    <div class="create-meeting-card">
        <div class="meeting-header">
            <div class="meeting-icon">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <rect x="2" y="7" width="20" height="15" rx="2" ry="2"></rect>
                    <polyline points="17 2 12 7 7 2"></polyline>
                </svg>
            </div>
            <h2>Create New Meeting</h2>
            <p>Schedule a virtual meeting for your students</p>
        </div>
        
        <form method="POST" class="meeting-form">
            {% csrf_token %}
            
            <div class="form-group">
                <label for="title">Meeting Title *</label>
                <input type="text" id="title" name="title" required placeholder="e.g., Mathematics Class - Chapter 5">
            </div>
            
            <div class="form-group">
                <label for="description">Description</label>
                <textarea id="description" name="description" placeholder="Meeting agenda and topics to be covered"></textarea>
            </div>
            
            <div class="form-row">
                <div class="form-group">
                    <label for="scheduled_time">Scheduled Date & Time *</label>
                    <input type="datetime-local" id="scheduled_time" name="scheduled_time" required>
                </div>
                
                <div class="form-group">
                    <label for="duration_minutes">Duration (minutes) *</label>
                    <input type="number" id="duration_minutes" name="duration_minutes" value="60" min="15" max="480" required>
                </div>
            </div>
            
            <div class="checkbox-group">
                <label class="checkbox-label">
                    <input type="checkbox" name="allow_screen_share" checked>
                    <span>Allow Screen Sharing</span>
                </label>
                
                <label class="checkbox-label">
                    <input type="checkbox" name="allow_chat" checked>
                    <span>Enable Chat</span>
                </label>
            </div>
            
            <div class="form-actions">
                <a href="{% url 'teacher_meetings' %}" class="btn-cancel">Cancel</a>
                <button type="submit" class="btn-submit">Create Meeting</button>
            </div>
        </form>
    </div>
</div>
{% endblock %}
