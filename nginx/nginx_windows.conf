# ─────────────────────────────────────────────────────────────────────────────
# Nginx Load Balancer — Windows local deployment
#
# Architecture:
#   Browser → Nginx :80 (load balancer) → 3 Daphne workers :8010 :8011 :8012
#
# HTTP  requests → least_conn  (least busy worker)
# WebSocket /ws/ → ip_hash     (sticky — same client, same worker)
#
# Start workers first via start_all.ps1, then nginx picks them up.
# ─────────────────────────────────────────────────────────────────────────────

worker_processes  auto;

events {
    worker_connections  1024;
}

http {
    include       mime.types;
    default_type  application/octet-stream;

    sendfile        on;
    keepalive_timeout  65;

    # ── Upstream: 3 Daphne workers, least-connections balancing ──────────────
    upstream django_http {
        least_conn;
        server 127.0.0.1:8010;
        server 127.0.0.1:8011;
        server 127.0.0.1:8012;
        keepalive 32;
    }

    # ── Upstream: WebSocket — sticky by client IP ─────────────────────────────
    upstream django_ws {
        ip_hash;
        server 127.0.0.1:8010;
        server 127.0.0.1:8011;
        server 127.0.0.1:8012;
        keepalive 16;
    }

    # ── HTTP server on port 80 ────────────────────────────────────────────────
    server {
        listen       80;
        server_name  _;

        client_max_body_size 50M;

        # Security headers
        add_header X-Content-Type-Options  "nosniff"       always;
        add_header X-Frame-Options         "SAMEORIGIN"    always;
        add_header X-XSS-Protection        "1; mode=block" always;

        # ── Static files — served directly by nginx ───────────────────────────
        location /static/ {
            alias C:/Users/hp123/Downloads/Edumi2/staticfiles/;
            expires 7d;
            add_header Cache-Control "public, immutable";
            access_log off;
        }

        # ── Media files ───────────────────────────────────────────────────────
        location /media/ {
            alias C:/Users/hp123/Downloads/Edumi2/media/;
            expires 1d;
            access_log off;
        }

        # ── WebSocket — sticky (ip_hash) ──────────────────────────────────────
        location /ws/ {
            proxy_pass         http://django_ws;
            proxy_http_version 1.1;
            proxy_set_header   Upgrade    $http_upgrade;
            proxy_set_header   Connection "upgrade";
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_read_timeout 3600s;
            proxy_send_timeout 3600s;
        }

        # ── HLS .ts segments — no buffer, load balanced ───────────────────────
        location ~* \.ts$ {
            proxy_pass         http://django_http;
            proxy_http_version 1.1;
            proxy_set_header   Connection        "";
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_buffering    off;
            proxy_read_timeout 30s;
            add_header         Cache-Control "no-cache, no-store";
        }

        # ── HLS .m3u8 manifests — no cache, load balanced ────────────────────
        location ~* \.m3u8$ {
            proxy_pass         http://django_http;
            proxy_http_version 1.1;
            proxy_set_header   Connection        "";
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_buffering    off;
            proxy_read_timeout 15s;
            add_header         Cache-Control "no-cache, no-store, must-revalidate";
        }

        # ── All other requests — load balanced ────────────────────────────────
        location / {
            proxy_pass         http://django_http;
            proxy_http_version 1.1;
            proxy_set_header   Connection        "";
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_read_timeout 60s;
            proxy_connect_timeout 10s;
        }

        # ── Health check ──────────────────────────────────────────────────────
        location /health/ {
            proxy_pass         http://django_http;
            proxy_http_version 1.1;
            proxy_set_header   Connection "";
            proxy_set_header   Host $host;
            access_log         off;
        }
    }
}
