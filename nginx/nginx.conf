# ─────────────────────────────────────────────────────────────────────────────
# Nginx — Load Balancer + Reverse Proxy for Edumi
#
# Algorithm:
#   HTTP requests  → least_conn  (send to least busy worker)
#   WebSocket /ws/ → ip_hash     (sticky — same client always hits same worker)
#
# Scale workers:  docker compose up --scale web=3
# ─────────────────────────────────────────────────────────────────────────────

# ── HTTP upstream — least connections load balancing ─────────────────────────
upstream django_http {
    least_conn;                  # route to worker with fewest active connections

    server web:8000;             # Docker Compose resolves "web" to all replicas
                                 # automatically via its internal DNS round-robin.
                                 # Nginx least_conn then picks the least busy one.

    keepalive 64;                # keep connections warm to reduce latency
}

# ── WebSocket upstream — IP hash (sticky sessions) ───────────────────────────
# WebSocket connections must stay on the same backend for the lifetime of the
# connection. ip_hash ensures the same client IP always hits the same worker.
upstream django_ws {
    ip_hash;

    server web:8000;

    keepalive 32;
}

# ── HTTP → HTTPS redirect ─────────────────────────────────────────────────────
server {
    listen 80;
    server_name _;
    return 301 https://$host$request_uri;
}

# ── HTTPS + Load Balanced server ─────────────────────────────────────────────
server {
    listen 443 ssl;
    server_name _;

    ssl_certificate     /etc/nginx/ssl/cert.pem;
    ssl_certificate_key /etc/nginx/ssl/key.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 10m;

    client_max_body_size 50M;

    # ── Security headers ──────────────────────────────────────────────────────
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options    "nosniff"        always;
    add_header X-Frame-Options           "SAMEORIGIN"     always;
    add_header X-XSS-Protection          "1; mode=block"  always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin" always;

    # ── Static files — served by nginx directly, no Django involved ───────────
    location /static/ {
        alias /app/static/;
        expires 7d;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # ── Media files ───────────────────────────────────────────────────────────
    location /media/ {
        alias /app/media/;
        expires 1d;
        access_log off;
    }

    # ── WebSocket — sticky (ip_hash upstream) ────────────────────────────────
    location /ws/ {
        proxy_pass            http://django_ws;
        proxy_http_version    1.1;
        proxy_set_header      Upgrade           $http_upgrade;
        proxy_set_header      Connection        "upgrade";
        proxy_set_header      Host              $host;
        proxy_set_header      X-Real-IP         $remote_addr;
        proxy_set_header      X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header      X-Forwarded-Proto $scheme;
        proxy_read_timeout    3600s;
        proxy_send_timeout    3600s;
    }

    # ── HLS .ts segments — no buffering, load balanced ───────────────────────
    location ~* \.ts$ {
        proxy_pass            http://django_http;
        proxy_http_version    1.1;
        proxy_set_header      Connection        "";
        proxy_set_header      Host              $host;
        proxy_set_header      X-Real-IP         $remote_addr;
        proxy_set_header      X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header      X-Forwarded-Proto $scheme;
        proxy_buffering       off;
        proxy_read_timeout    30s;
        add_header            Cache-Control "no-cache, no-store";
    }

    # ── HLS .m3u8 manifests — no cache, load balanced ────────────────────────
    location ~* \.m3u8$ {
        proxy_pass            http://django_http;
        proxy_http_version    1.1;
        proxy_set_header      Connection        "";
        proxy_set_header      Host              $host;
        proxy_set_header      X-Real-IP         $remote_addr;
        proxy_set_header      X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header      X-Forwarded-Proto $scheme;
        proxy_buffering       off;
        proxy_read_timeout    15s;
        add_header            Cache-Control "no-cache, no-store, must-revalidate";
    }

    # ── All other HTTP requests — load balanced ───────────────────────────────
    location / {
        proxy_pass            http://django_http;
        proxy_http_version    1.1;
        proxy_set_header      Connection        "";
        proxy_set_header      Host              $host;
        proxy_set_header      X-Real-IP         $remote_addr;
        proxy_set_header      X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header      X-Forwarded-Proto $scheme;
        proxy_read_timeout    60s;
        proxy_connect_timeout 10s;

        # Pass load balancer info to Django
        proxy_set_header      X-Forwarded-Host  $host;
        proxy_set_header      X-Forwarded-Port  $server_port;
    }

    # ── Health check endpoint (used by load balancer monitoring) ─────────────
    location /health/ {
        proxy_pass            http://django_http;
        proxy_http_version    1.1;
        proxy_set_header      Connection "";
        proxy_set_header      Host $host;
        access_log            off;
    }
}
